name: Deploy Dev

on:
  pull_request:
    branches: [main]
    paths:
      - 'interview_questions/**'
      - '.github/workflows/**'

env:
  TF_VERSION: "1.5.0"
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
  AWS_DEFAULT_REGION: "us-east-1"

jobs:
  deploy-dev:
    name: Deploy to Dev (Challenge ${{ matrix.challenge }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    strategy:
      matrix:
        challenge: [1, 2, 3, 4]

    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          DEBUG: "0"
          LAMBDA_EXECUTOR: local
          LAMBDA_RUNTIME_EXECUTOR: local
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Package Lambda
        if: matrix.challenge == 3 || matrix.challenge == 4
        working-directory: interview_questions/app
        run: zip -j handler.zip handler.py

      - name: Terraform Init
        working-directory: interview_questions/challenge_${{ matrix.challenge }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: interview_questions/challenge_${{ matrix.challenge }}
        run: terraform plan -no-color -var="environment=dev"

      - name: Comment Plan on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.plan.outputs.stdout }}`;
            const truncated = output.length > 60000 ? output.substring(0, 60000) + '\n...(truncated)' : output;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Dev Plan - Challenge ${{ matrix.challenge }}\n\`\`\`hcl\n${truncated}\n\`\`\``
            })

      - name: Terraform Apply
        working-directory: interview_questions/challenge_${{ matrix.challenge }}
        run: terraform apply -auto-approve -var="environment=dev"

      - name: Comment Deploy Success
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Deployed to Dev - Challenge ${{ matrix.challenge }}\nTest your changes before merging.`
            })
