name: Deploy Prod

on:
  push:
    branches: [main]
    paths:
      - 'interview_questions/**'

env:
  TF_VERSION: "1.5.0"
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
  AWS_DEFAULT_REGION: "us-east-1"

jobs:
  deploy-prod:
    name: Deploy to Prod (Challenge ${{ matrix.challenge }})
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    strategy:
      matrix:
        challenge: [1, 2, 3, 4]

    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          DEBUG: "0"
          LAMBDA_EXECUTOR: local
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Package Lambda
        if: matrix.challenge == 3 || matrix.challenge == 4
        working-directory: interview_questions/app
        run: zip -j handler.zip handler.py

      - name: Terraform Init
        working-directory: interview_questions/challenge_${{ matrix.challenge }}
        run: terraform init

      - name: Terraform Plan
        working-directory: interview_questions/challenge_${{ matrix.challenge }}
        run: terraform plan -no-color -out=tfplan -var="environment=prod"

      - name: Terraform Apply
        working-directory: interview_questions/challenge_${{ matrix.challenge }}
        run: terraform apply -auto-approve tfplan
