name: Deploy Prod

on:
  push:
    branches: [main]
    paths:
      - 'interview_questions/**'
      - '.github/workflows/**'

env:
  TF_VERSION: "1.5.0"
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
  AWS_DEFAULT_REGION: "us-east-1"

jobs:
  deploy-prod:
    name: Deploy to Prod (Challenge ${{ matrix.challenge }})
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    strategy:
      matrix:
        challenge: [1, 2, 3, 4]

    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          DEBUG: "0"
          LAMBDA_EXECUTOR: docker-reuse
          DOCKER_HOST: unix:///var/run/docker.sock
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
        options: >-
          --privileged
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Package Lambda
        if: matrix.challenge == 3 || matrix.challenge == 4
        working-directory: interview_questions/app
        run: zip -j handler.zip handler.py

      - name: Terraform Init
        working-directory: interview_questions/challenge_${{ matrix.challenge }}
        run: terraform init

      - name: Terraform Plan
        working-directory: interview_questions/challenge_${{ matrix.challenge }}
        run: terraform plan -no-color -out=tfplan -var="environment=prod"

      - name: Terraform Apply
        working-directory: interview_questions/challenge_${{ matrix.challenge }}
        run: terraform apply -auto-approve tfplan

      - name: Smoke Test - Challenge 1
        if: matrix.challenge == 1
        run: |
          aws --endpoint-url=http://localhost:4566 s3 ls s3://ncaa/ 2>&1
          echo "Challenge 1: S3 bucket 'ncaa' exists"

      - name: Smoke Test - Challenge 2
        if: matrix.challenge == 2
        run: |
          aws --endpoint-url=http://localhost:4566 iam get-user --user-name ncaa-analyst
          aws --endpoint-url=http://localhost:4566 iam get-role --role-name ncaa-data-writer
          echo "Challenge 2: IAM user and role exist"

      - name: Smoke Test - Challenge 4
        if: matrix.challenge == 4
        run: |
          pip install boto3
          python tests/challenge_4/seed_data.py

          API_ID=$(aws --endpoint-url=http://localhost:4566 apigateway get-rest-apis --query 'items[0].id' --output text)
          echo "API Gateway ID: $API_ID"

          echo "=== Testing /scores ==="
          SCORES=$(curl -sf "http://localhost:4566/restapis/${API_ID}/prod/_user_request_/scores")
          echo "$SCORES" | python -m json.tool
          echo "$SCORES" | python -c "import sys,json; data=json.load(sys.stdin); assert len(data) > 0, 'No scores returned'; print(f'PASS: {len(data)} scores returned')"

          echo "=== Testing /standings ==="
          STANDINGS=$(curl -sf "http://localhost:4566/restapis/${API_ID}/prod/_user_request_/standings")
          echo "$STANDINGS" | python -m json.tool
          echo "$STANDINGS" | python -c "import sys,json; data=json.load(sys.stdin); assert len(data) > 0, 'No standings returned'; print(f'PASS: {len(data)} standings returned')"
